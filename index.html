    <script type="module">
        import React, {
            useState,
            useEffect,
            useRef,
            useCallback
        } from 'react';
        import ReactDOM from 'react-dom/client';

        // ---------- BIT VOICE SYSTEM (chiptune character voices) ----------
        // Each character gets a unique "beep" voice (short waveform with envelope)
        // Audio context is lazy-initialized and resumed on first user interaction.
        const voiceMap = {
            Cassandra: {
                waveform: 'sawtooth',
                baseFreq: 880,
                filterFreq: 1800,
                decay: 0.2,
                gain: 0.25
            }, // bright, high pitch
            thornton: {
                waveform: 'square',
                baseFreq: 440,
                filterFreq: 800,
                decay: 0.25,
                gain: 0.22
            }, // gruff, lower
            butterfly: {
                waveform: 'sine',
                baseFreq: 1320,
                filterFreq: 2800,
                decay: 0.4,
                gain: 0.2
            }, // ethereal high
            narrator: {
                waveform: 'triangle',
                baseFreq: 660,
                filterFreq: 1200,
                decay: 0.2,
                gain: 0.18
            }, // neutral, calm
            default: {
                waveform: 'sine',
                baseFreq: 520,
                filterFreq: 1000,
                decay: 0.18,
                gain: 0.2
            }
        };

        class BitVoiceEngine {
            constructor() {
                this.audioCtx = null;
                this.initialized = false;
                this.resumeOnInteraction = this.resumeOnInteraction.bind(this);
            }
            init() {
                if (this.audioCtx) return;
                try {
                    this.audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    // start suspended, will resume on first user gesture
                } catch (e) {
                    console.warn("Web Audio not supported");
                }
            }
            async resumeOnInteraction() {
                if (!this.audioCtx) this.init();
                if (this.audioCtx && this.audioCtx.state === 'suspended') {
                    await this.audioCtx.resume();
                }
                this.initialized = true;
            }
            playCharacterVoice(characterKey) {
                if (!this.audioCtx || this.audioCtx.state !== 'running') {
                    // try to resume silently - actual resume will happen on click
                    if (this.audioCtx && this.audioCtx.state === 'suspended') {
                        this.resumeOnInteraction().then(() => this._playSound(characterKey)).catch(() => {});
                    }
                    return;
                }
                this._playSound(characterKey);
            }
            _playSound(characterKey) {
                if (!this.audioCtx) return;
                const settings = voiceMap[characterKey] || voiceMap.default;
                const now = this.audioCtx.currentTime;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                const filter = this.audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = settings.filterFreq;
                osc.type = settings.waveform;
                osc.frequency.value = settings.baseFreq;
                gain.gain.value = settings.gain;
                gain.gain.exponentialRampToValueAtTime(0.0001, now + settings.decay);
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.audioCtx.destination);
                osc.start();
                osc.stop(now + settings.decay);
                // small pitch glide for character
                if (settings.waveform !== 'sine') {
                    osc.frequency.exponentialRampToValue(settings.baseFreq * 0.85, now + 0.05);
                }
            }
        }
        const voiceEngine = new BitVoiceEngine();
        // global resume on any click (dialogue box)
        function ensureAudioResume() {
            if (voiceEngine.audioCtx && voiceEngine.audioCtx.state === 'suspended') {
                voiceEngine.resumeOnInteraction();
            } else if (!voiceEngine.audioCtx) {
                voiceEngine.init();
                voiceEngine.resumeOnInteraction();
            }
        }
        // attach resume listener to document (once)
        document.addEventListener('click', () => ensureAudioResume(), {
            once: false
        });
        
    </script>
